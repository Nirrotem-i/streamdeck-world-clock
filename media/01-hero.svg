<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d1a"/>

  <!-- Title area -->
  <text x="600" y="72" text-anchor="middle" font-family="SF Pro Display, -apple-system, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">TimeShift</text>
  <text x="600" y="108" text-anchor="middle" font-family="SF Pro Display, -apple-system, Arial, sans-serif" font-size="20" fill="#888888">Explore time across the globe from your Stream Deck</text>

  <!-- Stream Deck frame -->
  <rect x="200" y="140" width="800" height="400" rx="24" fill="#111111" stroke="#2a2a2a" stroke-width="2"/>

  <!-- City clock buttons - Row 1 -->
  <!-- NYC -->
  <rect x="240" y="170" width="130" height="130" rx="10" fill="#1a1a2e"/>
  <circle cx="258" cy="187" r="6" fill="#ffd93d"/>
  <text x="305" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">NYC</text>
  <text x="305" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff9f43">02:34 PM</text>
  <text x="305" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Jun 24</text>

  <!-- TLV -->
  <rect x="390" y="170" width="130" height="130" rx="10" fill="#1a1a2e"/>
  <circle cx="408" cy="187" r="6" fill="#ffd93d"/>
  <text x="455" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">TLV</text>
  <text x="455" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff9f43">09:34 PM</text>
  <text x="455" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Jun 24</text>

  <!-- LON -->
  <rect x="540" y="170" width="130" height="130" rx="10" fill="#1a1a2e"/>
  <circle cx="558" cy="187" r="7" fill="#aabbdd"/>
  <circle cx="562" cy="184" r="6" fill="#1a1a2e"/>
  <text x="605" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">LON</text>
  <text x="605" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff">07:34 PM</text>
  <text x="605" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Jun 24</text>

  <!-- TKY -->
  <rect x="690" y="170" width="130" height="130" rx="10" fill="#1a1a2e"/>
  <circle cx="708" cy="187" r="7" fill="#aabbdd"/>
  <circle cx="712" cy="184" r="6" fill="#1a1a2e"/>
  <text x="755" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">TKY</text>
  <text x="755" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff">03:34 AM</text>
  <text x="755" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Jun 25</text>

  <!-- SFO -->
  <rect x="840" y="170" width="130" height="130" rx="10" fill="#1a1a2e"/>
  <circle cx="858" cy="187" r="6" fill="#ffd93d"/>
  <text x="905" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">SFO</text>
  <text x="905" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff9f43">11:34 AM</text>
  <text x="905" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Jun 24</text>

  <!-- Control buttons - Row 2 -->
  <!-- H+ -->
  <rect x="315" y="320" width="110" height="110" rx="10" fill="#1a1a2e"/>
  <rect x="321" y="326" width="98" height="98" rx="6" fill="none" stroke="#4ecca3" stroke-width="2.5"/>
  <text x="370" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#4ecca3">H+</text>
  <text x="370" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa">1h / 3h</text>

  <!-- H- -->
  <rect x="445" y="320" width="110" height="110" rx="10" fill="#1a1a2e"/>
  <rect x="451" y="326" width="98" height="98" rx="6" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="500" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ff6b6b">H−</text>
  <text x="500" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa">1h / 3h</text>

  <!-- M+ -->
  <rect x="575" y="320" width="110" height="110" rx="10" fill="#1a1a2e"/>
  <rect x="581" y="326" width="98" height="98" rx="6" fill="none" stroke="#4ecca3" stroke-width="2.5"/>
  <text x="630" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#4ecca3">M+</text>
  <text x="630" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa">1m / 15m</text>

  <!-- M- -->
  <rect x="705" y="320" width="110" height="110" rx="10" fill="#1a1a2e"/>
  <rect x="711" y="326" width="98" height="98" rx="6" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="760" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ff6b6b">M−</text>
  <text x="760" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa">1m / 15m</text>

  <!-- Reset -->
  <rect x="835" y="320" width="110" height="110" rx="10" fill="#1a1a2e"/>
  <rect x="841" y="326" width="98" height="98" rx="6" fill="none" stroke="#ffd93d" stroke-width="2.5"/>
  <path d="M 870 370 A 16 16 0 1 1 890 386" fill="none" stroke="#ffd93d" stroke-width="3" stroke-linecap="round"/>
  <polygon points="867,364 874,372 864,374" fill="#ffd93d"/>
  <text x="890" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffd93d">RESET</text>

  <!-- Bottom tagline -->
  <text x="600" y="570" text-anchor="middle" font-family="SF Pro Display, -apple-system, Arial, sans-serif" font-size="16" fill="#555555">Add city clocks • Shift hours &amp; minutes • Compare timezones instantly</text>

  <!-- Feature pills -->
  <rect x="380" y="590" width="120" height="28" rx="14" fill="none" stroke="#4ecca3" stroke-width="1.5" opacity="0.7"/>
  <text x="440" y="609" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4ecca3">Day/Night</text>

  <rect x="540" y="590" width="120" height="28" rx="14" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="609" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">Time Shift</text>

  <rect x="700" y="590" width="120" height="28" rx="14" fill="none" stroke="#ff9f43" stroke-width="1.5" opacity="0.7"/>
  <text x="760" y="609" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff9f43">Auto Reset</text>
</svg>
