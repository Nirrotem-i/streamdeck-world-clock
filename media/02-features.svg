<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#0d0d1a"/>

  <!-- Feature 1: City Clocks -->
  <rect x="40" y="40" width="350" height="320" rx="16" fill="#12122a" stroke="#2a2a4e" stroke-width="1"/>
  <text x="215" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff">City Clocks</text>

  <!-- Mini clocks -->
  <rect x="70" y="100" width="85" height="85" rx="8" fill="#1a1a2e"/>
  <circle cx="82" cy="112" r="5" fill="#ffd93d"/>
  <text x="112" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">NYC</text>
  <text x="112" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ff9f43">02:34</text>
  <text x="112" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Jun 24</text>

  <rect x="170" y="100" width="85" height="85" rx="8" fill="#1a1a2e"/>
  <circle cx="182" cy="112" r="5" fill="#ffd93d"/>
  <text x="212" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">TLV</text>
  <text x="212" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ff9f43">09:34</text>
  <text x="212" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Jun 24</text>

  <rect x="270" y="100" width="85" height="85" rx="8" fill="#1a1a2e"/>
  <circle cx="282" cy="112" r="6" fill="#aabbdd"/>
  <circle cx="285" cy="110" r="5" fill="#1a1a2e"/>
  <text x="312" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">TKY</text>
  <text x="312" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#00d4ff">03:34</text>
  <text x="312" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Jun 25</text>

  <text x="215" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">400+ timezones available</text>
  <text x="215" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Day/night sun &amp; moon indicator</text>
  <text x="215" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Custom labels (up to 6 chars)</text>
  <text x="215" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Live-updating every second</text>

  <!-- Feature 2: Time Shifting -->
  <rect x="425" y="40" width="350" height="320" rx="16" fill="#12122a" stroke="#2a2a4e" stroke-width="1"/>
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4ecca3">Time Shifting</text>

  <!-- Control buttons -->
  <rect x="470" y="100" width="75" height="75" rx="8" fill="#1a1a2e"/>
  <rect x="474" y="104" width="67" height="67" rx="5" fill="none" stroke="#4ecca3" stroke-width="2"/>
  <text x="507" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4ecca3">H+</text>

  <rect x="560" y="100" width="75" height="75" rx="8" fill="#1a1a2e"/>
  <rect x="564" y="104" width="67" height="67" rx="5" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  <text x="597" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff6b6b">H−</text>

  <rect x="650" y="100" width="75" height="75" rx="8" fill="#1a1a2e"/>
  <rect x="654" y="104" width="67" height="67" rx="5" fill="none" stroke="#4ecca3" stroke-width="2"/>
  <text x="687" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4ecca3">M+</text>

  <text x="600" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Tap: +1h or +1m</text>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Hold: +3h or +15m</text>
  <text x="600" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">All clocks shift simultaneously</text>
  <text x="600" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Red offset badge shows shift</text>

  <!-- Feature 3: Smart Reset -->
  <rect x="810" y="40" width="350" height="320" rx="16" fill="#12122a" stroke="#2a2a4e" stroke-width="1"/>
  <text x="985" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffd93d">Smart Reset</text>

  <!-- Reset button -->
  <rect x="935" y="100" width="100" height="100" rx="10" fill="#1a1a2e"/>
  <rect x="941" y="106" width="88" height="88" rx="6" fill="none" stroke="#ffd93d" stroke-width="2.5"/>
  <path d="M 965 145 A 16 16 0 1 1 985 161" fill="none" stroke="#ffd93d" stroke-width="3" stroke-linecap="round"/>
  <polygon points="962,140 968,148 959,149" fill="#ffd93d"/>
  <text x="985" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffd93d">RESET</text>

  <text x="985" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Tap: reset to real time</text>
  <text x="985" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Hold: lock/unlock auto-reset</text>
  <text x="985" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Auto-resets after 60s idle</text>
  <text x="985" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaa">Lock when comparing longer</text>
</svg>
