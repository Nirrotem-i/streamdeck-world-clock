<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>World Clock - Stream Deck Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 20px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 400;
    }
    .status {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }
    .status span { color: #00d4ff; }
    .deck {
      display: grid;
      grid-template-columns: repeat(5, 100px);
      gap: 12px;
      background: #222;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .key {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
      image-rendering: pixelated;
    }
    .key:hover { transform: scale(1.05); }
    .key:active { transform: scale(0.95); }
    .key.empty {
      background: #1a1a1a;
      border: 1px dashed #333;
      cursor: default;
    }
    .key.empty:hover { transform: none; }
    .instructions {
      margin-top: 30px;
      font-size: 13px;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
    .instructions kbd {
      background: #333;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1>Stream Deck Preview — World Clock</h1>
  <div class="status">Offset: <span id="offset-display">LIVE</span></div>

  <div class="deck">
    <!-- Row 1: cities -->
    <canvas class="key" id="city-0" width="144" height="144"></canvas>
    <canvas class="key" id="city-1" width="144" height="144"></canvas>
    <canvas class="key" id="city-2" width="144" height="144"></canvas>
    <canvas class="key" id="city-3" width="144" height="144"></canvas>
    <canvas class="key" id="city-4" width="144" height="144"></canvas>
    <!-- Row 2: empty + controls -->
    <div class="key empty"></div>
    <canvas class="key" id="ctrl-hour-plus" width="144" height="144"></canvas>
    <canvas class="key" id="ctrl-hour-minus" width="144" height="144"></canvas>
    <canvas class="key" id="ctrl-min-plus" width="144" height="144"></canvas>
    <canvas class="key" id="ctrl-min-minus" width="144" height="144"></canvas>
    <!-- Row 3: reset -->
    <div class="key empty"></div>
    <div class="key empty"></div>
    <canvas class="key" id="ctrl-reset" width="144" height="144"></canvas>
    <div class="key empty"></div>
    <div class="key empty"></div>
  </div>

  <div class="instructions">
    Click <kbd>H+</kbd> <kbd>H−</kbd> to shift hours &nbsp;|&nbsp;
    Click <kbd>M+</kbd> <kbd>M−</kbd> for 1 min, hold for 15 min &nbsp;|&nbsp;
    <kbd>↺</kbd> to reset<br>
    Top row shows live clocks that all shift together
  </div>

  <script>
    let globalOffsetMinutes = 0;

    const cities = [
      { label: 'TLV', timezone: 'Asia/Jerusalem' },
      { label: 'NYC', timezone: 'America/New_York' },
      { label: 'LON', timezone: 'Europe/London' },
      { label: 'TKY', timezone: 'Asia/Tokyo' },
      { label: 'SFO', timezone: 'America/Los_Angeles' },
    ];

    function renderCity(canvasId, city) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const now = new Date();
      now.setMinutes(now.getMinutes() + globalOffsetMinutes);

      const timeStr = now.toLocaleTimeString('en-US', {
        timeZone: city.timezone,
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      });

      const dateStr = now.toLocaleDateString('en-US', {
        timeZone: city.timezone,
        month: 'short',
        day: 'numeric'
      });

      const hour = parseInt(now.toLocaleTimeString('en-US', {
        timeZone: city.timezone,
        hour: 'numeric',
        hour12: false
      }));
      const isDay = hour >= 6 && hour < 20;

      const grad = ctx.createLinearGradient(0, 0, 0, 144);
      if (isDay) {
        grad.addColorStop(0, '#4a90d9');
        grad.addColorStop(1, '#f5a623');
      } else {
        grad.addColorStop(0, '#0d1b2a');
        grad.addColorStop(1, '#1b2838');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 144, 144);

      ctx.fillStyle = isDay ? '#ffffff' : '#8899aa';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(city.label, 72, 28);

      ctx.font = 'bold 32px Arial';
      ctx.fillStyle = isDay ? '#fff8e1' : '#64ffda';
      ctx.fillText(timeStr, 72, 68);

      ctx.font = 'bold 16px Arial';
      ctx.fillStyle = isDay ? '#ffe082' : '#5c7a99';
      ctx.fillText(dateStr, 72, 100);

      if (globalOffsetMinutes !== 0) {
        const offsetHours = Math.floor(Math.abs(globalOffsetMinutes) / 60);
        const offsetMins = Math.abs(globalOffsetMinutes) % 60;
        const sign = globalOffsetMinutes > 0 ? '+' : '-';
        let offsetStr = sign + offsetHours + 'h';
        if (offsetMins > 0) offsetStr += offsetMins + 'm';

        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = isDay ? '#ffffff' : '#ff6b6b';
        ctx.fillText(offsetStr, 72, 130);
      }
    }

    function renderControl(canvasId, label, sublabel, color) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, 144, 144);

      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.strokeRect(8, 8, 128, 128);

      ctx.fillStyle = color;
      ctx.font = 'bold 42px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 72, 60);

      ctx.font = '20px Arial';
      ctx.fillStyle = '#aaaaaa';
      ctx.fillText(sublabel, 72, 110);
    }

    function updateAll() {
      cities.forEach((city, i) => renderCity('city-' + i, city));

      renderControl('ctrl-hour-plus', 'H+', '1 hr', '#4ecca3');
      renderControl('ctrl-hour-minus', 'H−', '1 hr', '#ff6b6b');
      renderControl('ctrl-min-plus', 'M+', '1m / 15m', '#4ecca3');
      renderControl('ctrl-min-minus', 'M−', '1m / 15m', '#ff6b6b');

      const resetColor = globalOffsetMinutes === 0 ? '#555' : '#ffd93d';
      renderControl('ctrl-reset', '↺', 'RESET', resetColor);

      const display = document.getElementById('offset-display');
      if (globalOffsetMinutes === 0) {
        display.textContent = 'LIVE';
        display.style.color = '#00d4ff';
      } else {
        const h = Math.floor(Math.abs(globalOffsetMinutes) / 60);
        const m = Math.abs(globalOffsetMinutes) % 60;
        const sign = globalOffsetMinutes > 0 ? '+' : '-';
        let str = sign + h + 'h';
        if (m > 0) str += m + 'm';
        display.textContent = str;
        display.style.color = '#ff9f43';
      }
    }

    document.getElementById('ctrl-hour-plus').addEventListener('click', () => { globalOffsetMinutes += 60; updateAll(); });
    document.getElementById('ctrl-hour-minus').addEventListener('click', () => { globalOffsetMinutes -= 60; updateAll(); });
    document.getElementById('ctrl-reset').addEventListener('click', () => { globalOffsetMinutes = 0; updateAll(); });

    const LONG_PRESS_MS = 500;

    function setupMinButton(id, shortDelta, longDelta) {
      const el = document.getElementById(id);
      let timer = null;
      let fired = false;

      el.addEventListener('mousedown', () => {
        fired = false;
        timer = setTimeout(() => {
          fired = true;
          globalOffsetMinutes += longDelta;
          updateAll();
        }, LONG_PRESS_MS);
      });

      el.addEventListener('mouseup', () => {
        clearTimeout(timer);
        if (!fired) {
          globalOffsetMinutes += shortDelta;
          updateAll();
        }
      });

      el.addEventListener('mouseleave', () => {
        clearTimeout(timer);
      });
    }

    setupMinButton('ctrl-min-plus', 1, 15);
    setupMinButton('ctrl-min-minus', -1, -15);

    updateAll();
    setInterval(updateAll, 1000);
  </script>
</body>
</html>
